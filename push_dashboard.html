    headers: { Authorization: `token ${TOKEN}`, 'User-Agent': 'capareseau-push' }
  });
  let sha = null;
  if (getResp.ok) {
    const data = await getResp.json();
    sha = data.sha;
    log(`   SHA actuel : ${sha.slice(0,12)}...`, 'info');
  } else {
    log('   (nouveau fichier)', 'info');
  }
  
  // PUT
  const body = { message: `Données ${TODAY} — dashboard mis à jour`, content: file.b64 };
  if (sha) body.sha = sha;
  
  const putResp = await fetch(getUrl, {
    method: 'PUT',
    headers: { Authorization: `token ${TOKEN}`, 'Content-Type': 'application/json', 'User-Agent': 'capareseau-push' },
    body: JSON.stringify(body)
  });
  const putData = await putResp.json();
  
  if (putData.commit) {
    log(`   ✅ Commit : ${putData.commit.sha.slice(0,8)}`, 'ok');
    return true;
  } else {
    log(`   ❌ Échec : ${JSON.stringify(putData).slice(0, 200)}`, 'err');
    return false;
  }
}

async function main() {
  logEl.textContent = '';
  log(`🚀 Push vers ${OWNER}/${REPO}`, 'info');
  log(`📅 Date : ${TODAY}`, 'info');
  log(`📁 Fichiers : ${FILES.length}`, 'info');
  
  let ok = 0;
  for (const file of FILES) {
    const success = await pushFile(file);
    if (success) ok++;
  }
  
  log(`\n$==================================================`, 'info');
  if (ok === FILES.length) {
    log(`✅ ${ok}/${FILES.length} fichiers poussés avec succès !`, 'ok');
    log(`\n🌐 Dashboard : https://${OWNER.toLowerCase()}.github.io/${REPO}/`, 'ok');
    log('   (mise à jour visible dans ~30-60 secondes)', 'info');
  } else {
    log(`⚠️ ${ok}/${FILES.length} fichiers poussés`, 'err');
  }
}

main().catch(e => log('ERREUR: ' + e.message, 'err'));
</script>
