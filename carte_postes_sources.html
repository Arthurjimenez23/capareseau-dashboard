const map=L.map('map').setView([46.5,2.5],6);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'&copy; OpenStreetMap | Données: capareseau.fr',maxZoom:18}).addTo(map);
function gc(tx){if(tx>=100)return'#d32f2f';if(tx>=80)return'#f57c00';if(tx>=50)return'#fdd835';if(tx>=20)return'#66bb6a';return'#2196f3'}
function gr(tx){if(tx>=100)return 6;if(tx>=80)return 5;return 4}
let sat=0,high=0,med=0,low=0,free=0;
const allMarkers=[];
D.forEach(d=>{const[lat,lon,tx,cr,nom,reg]=d;const c=gc(tx);const m=L.circleMarker([lat,lon],{radius:gr(tx),fillColor:c,color:'#333',weight:0.5,opacity:1,fillOpacity:0.8});m.bindPopup('<div class="info-panel"><h4>'+nom+'</h4><b>Région:</b> '+reg+'<br><b>Taux remplissage:</b> '+tx+'%<br><b>Capacité réservée:</b> '+cr+' MW</div>');m._nom=nom;m.addTo(map);allMarkers.push(m);if(tx>=100)sat++;else if(tx>=80)high++;else if(tx>=50)med++;else if(tx>=20)low++;else free++});
document.getElementById('stats').innerHTML='<b>Postes sources RTE</b><br>Total: <b>'+D.length+'</b><br>Saturés: <b style="color:#d32f2f">'+sat+'</b><br>Élevé: <b style="color:#f57c00">'+high+'</b><br>Moyen: <b style="color:#fdd835">'+med+'</b><br>Faible: <b style="color:#66bb6a">'+low+'</b><br>Disponible: <b style="color:#2196f3">'+free+'</b>';
const legend=L.control({position:'bottomright'});legend.onAdd=function(){const div=L.DomUtil.create('div','legend');div.innerHTML='<h4>Taux de remplissage</h4><i style="background:#d32f2f"></i> Saturé (100%)<br><i style="background:#f57c00"></i> Élevé (80-99%)<br><i style="background:#fdd835"></i> Moyen (50-79%)<br><i style="background:#66bb6a"></i> Faible (20-49%)<br><i style="background:#2196f3"></i> Disponible (<20%)';return div};legend.addTo(map);
document.getElementById('search').addEventListener('input',function(e){const q=e.target.value.toUpperCase();if(!q){allMarkers.forEach(m=>m.setStyle({opacity:1,fillOpacity:0.8}));return}allMarkers.forEach(m=>{if(m._nom.toUpperCase().includes(q)){m.setStyle({opacity:1,fillOpacity:0.8})}else{m.setStyle({opacity:0.1,fillOpacity:0.1})}})});
